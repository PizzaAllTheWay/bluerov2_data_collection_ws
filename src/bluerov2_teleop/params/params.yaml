bluerov2_teleop_node:
# bluerov2_teleop:
  ros__parameters:
    odometry_topic_name: "/bluerov/odom"
    publish_period_ms: 10
    horizontal_vel_scaling: 1.0
    yaw_rate_scaling: .5
    orientation_gain: 4.0
    depth_scaling: 1.0
    depth_prop_gain: 70.0
    depth_joy_gain: 40.0
    horiz_joy_gain: 25.0
    yaw_joy_gain: 4.0
    integral_depth_gain: 0.08
    velocity_gains: [45.0, 45.0, 45.0, 12.0, 12.0, 20.0 ]
    thruster_config_angle: 45
    velocity_control: false
